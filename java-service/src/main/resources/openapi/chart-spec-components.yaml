# OpenAPI 3.0 components — ChartContract v2 (ETH-T18)
# Merged into springdoc /v3/api-docs output. See docs/CHART_CONTRACT_V2_MIGRATION.md

openapi: 3.0.3
info:
  title: ETH Stablecoin Simulator — Chart Components
  version: 2.0.0
paths: {}

components:
  schemas:
    ChartContract:
      type: object
      required:
        - schemaVersion
        - chartId
        - title
        - xAxis
        - yAxis
        - series
        - provenance
      properties:
        schemaVersion:
          type: string
          enum: ["2.0"]
        chartId:
          type: string
        title:
          type: string
        description:
          type: string
        xAxis:
          $ref: '#/components/schemas/ChartAxis'
        yAxis:
          $ref: '#/components/schemas/ChartAxis'
        series:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChartSeries'
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/ChartAnnotation'
        assumptions:
          type: object
          additionalProperties:
            type: string
        warnings:
          type: array
          items:
            type: string
        provenance:
          $ref: '#/components/schemas/ChartProvenance'

    ChartAxis:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
          enum: [linear, time, category]
        label:
          type: string
        unit:
          type: string
        format:
          type: string
        domain:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
        tickCount:
          type: integer

    ChartSeries:
      type: object
      required: [id, label, unit, data]
      properties:
        id:
          type: string
        label:
          type: string
        unit:
          type: string
        style:
          $ref: '#/components/schemas/ChartSeriesStyle'
        data:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DataPoint'

    DataPoint:
      type: object
      required: [x, plotValue, displayValue]
      properties:
        x: {}
        plotValue:
          type: number
        displayValue:
          type: string
        label:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ChartSeriesStyle:
      type: object
      properties:
        geometry:
          type: string
          enum: [line, area, band, bar]
        colorToken:
          type: string
          enum: [primary, secondary, positive, negative, warning, neutral]
        strokeDash:
          type: string
          enum: [solid, dashed, dotted]
        fillOpacity:
          type: number

    ChartAnnotation:
      type: object
      required: [id, kind]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [horizontal_line, vertical_line, band, point, label]
        axis:
          type: string
          enum: [x, y]
        plotValue:
          type: number
        displayValue:
          type: string
        plotValueEnd:
          type: number
        displayValueEnd:
          type: string
        label:
          type: string
        severity:
          type: string
          enum: [info, low, medium, high]

    ChartProvenance:
      type: object
      required: [builder, generatedAt, sources]
      properties:
        builder:
          type: string
        generatedAt:
          type: string
          format: date-time
        methodology:
          type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ChartSource'

    ChartSource:
      type: object
      required: [field, source, observedAt]
      properties:
        field:
          type: string
        source:
          type: string
        observedAt:
          type: string
          format: date-time
        stale:
          type: boolean

    SimulationResponse:
      type: object
      properties:
        charts:
          type: array
          items:
            $ref: '#/components/schemas/ChartContract'