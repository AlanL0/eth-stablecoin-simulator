server:
  port: ${PORT:8080}

spring:
  application:
    name: java-service
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${MODEL_PRIMARY:gpt-4o-mini}

# Default (local dev): full actuator + Swagger. Production must set SPRING_PROFILES_ACTIVE=production.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true

eth-simulator:
  static-eth-price-usd: ${STATIC_ETH_PRICE_USD:3800}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  default-system-supply-usd: 32000000000
  eth-rpc-url: ${ETH_RPC_URL:}
  public-price-api-url: ${PUBLIC_PRICE_API_URL:}
  chainlink-eth-usd-feed: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5B8419"
  price-cache-ttl-seconds: 60
  audit-lookback-blocks: 300000
  audit-max-events-per-wallet: 500
  audit-cache-max-addresses: 100
  audit-cache-ttl-seconds: 900
  yield-stale-threshold-seconds: 3600
  rate-limit-enabled: true
  rate-limit-requests-per-minute: 30
  rate-limit-burst: 10
  rate-limit-max-clients: 10000
  rate-limit-trust-forwarded-for: false
  http-connect-timeout-ms: 5000
  http-read-timeout-ms: 10000
  rpc-connect-timeout-ms: 5000
  rpc-read-timeout-ms: 30000
  rpc-call-timeout-ms: 30000
  blocking-io-max-concurrency: 64
  ingestion:
    enabled: true
    confirmation-depth: 12
    range-size: 10
    poll-interval-ms: 30000
    request-timeout-ms: 30000
    max-retries: 3
    retry-backoff-ms: 1000
    max-catch-up-blocks: 1000
    max-source-lag-blocks: 100
    max-reorg-window-blocks: 64
    lease-duration-seconds: 30
    websocket-wake-enabled: true
  protocol-sources:
    chain-id: 1
    chainlink:
      enabled: true
      address: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5B8419"
      stale-threshold-seconds: 3600
    sky:
      enabled: true
      chainlog: "0xdA0Ab1e00181DEbC73375a6F9bad8EaF7422B683"
      jug: "0x19c0976f590D67707E62397C87829d896Dc0f1F1"
      vat: "0x35D1b3F3D7966A1DFe207aa4514C12a259A0492B"
      susds: "0xa3931d71877C0E7a3148CB7Eb4463524fec27fbd"
      borrow-ilk: "ETH-A"
    liquity:
      enabled: true
      weth-active-pool: "0xacece9a6ff7fea9b9e1cdfeee61ca2b45cc4627b"
      weth-stability-pool: "0xf69eb8c0d95d4094c16686769460f678727393cf"
      bold-token: "0xb01dd87B29d187F3E3a4Bf6cdAebfb97F3D9aB98"
      savings-lookback-days: 30
    aave:
      enabled: true
      pool: "0x87870Bca3F3fD6335C3F4ce8392D69350B4fA4E2"
      gho: "0x40D16FC0246aD3160Ccc09B8D0D3A2cD28aE6C2f"
      sgho: "0xE1753F2e00940cC31213dd92013cF019DFE4ca1d"