server:
  port: ${PORT:8080}

spring:
  application:
    name: java-service
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${MODEL_PRIMARY:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true

eth-simulator:
  static-eth-price-usd: ${STATIC_ETH_PRICE_USD:3800}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  default-system-supply-usd: 32000000000
  eth-rpc-url: ${ETH_RPC_URL:}
  public-price-api-url: ${PUBLIC_PRICE_API_URL:}
  chainlink-eth-usd-feed: "0x5f4eC3Df9cbd43714FE2740f5E3616155c5B8419"
  price-cache-ttl-seconds: 60
  audit-lookback-blocks: 300000
  audit-max-events-per-wallet: 500
  audit-cache-max-addresses: 100
  audit-cache-ttl-seconds: 900
  http-connect-timeout-ms: 5000
  http-read-timeout-ms: 10000
  rpc-connect-timeout-ms: 5000
  rpc-read-timeout-ms: 30000
  rpc-call-timeout-ms: 30000
  blocking-io-max-concurrency: 64