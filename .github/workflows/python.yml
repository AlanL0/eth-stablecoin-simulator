name: Python Agent

on:
  pull_request:
    paths:
      - 'python-agent/**'
      - '.github/workflows/python.yml'
  push:
    branches: [main]
    paths:
      - 'python-agent/**'
      - '.github/workflows/python.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python-agent/pyproject.toml

      - name: Install dependencies
        working-directory: python-agent
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: python-agent
        run: python -m pytest -q