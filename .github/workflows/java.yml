name: Java

on:
  pull_request:
    paths:
      - 'java-service/**'
      - 'db/**'
      - 'scripts/sync-fixtures.sh'
      - '.github/workflows/java.yml'
  push:
    branches: [main]
    paths:
      - 'java-service/**'
      - 'db/**'
      - 'scripts/sync-fixtures.sh'
      - '.github/workflows/java.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Sync fixtures
        run: make sync-fixtures

      - name: Run tests
        working-directory: java-service
        run: mvn -q test