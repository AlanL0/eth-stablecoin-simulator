services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ethsim
    ports:
      - "54329:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ethsim"]
      interval: 5s
      timeout: 5s
      retries: 10

  java-service:
    build:
      context: ./java-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      STATIC_ETH_PRICE_USD: "3800"
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      # DATABASE_URL optional until services write to DB (WP-4+)
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: